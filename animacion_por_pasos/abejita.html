<html>
<head>
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .contenedor{
            width: 800px;
            height: 300px;
            border: 1px solid black;
            margin:0 auto;
            position: relative;
            overflow: hidden;
        }
        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: rgba(255, 0, 0, 0);

            position: absolute;
            top: 0px;
            left: 0px;

            animation: cuadrito 3s infinite;
        }
        @keyframes cuadrito{
            0%{
                top: 0px;
                left:-100px;
                rotate:45deg;
            }
            50%{
                top: 200px;
                left: 350px;
                rotate:0deg;
            }
            100%{
                top: 0px;
                left: 800px;
                rotate:45deg;
            }
        }
        .abeja{
            position: absolute;
            width: 100%;
            z-index: 0;
        }
        .cuadrito2{
            width: 100px;
            height: 100px;
            background-color: rgba(233, 11, 11, 0);

            position: absolute;
            top: -100px;
            left: 800px;

            animation: cuadrito2 5s infinite 2s;
        }
        @keyframes cuadrito2{
            0%{
                top: -100px;
                left:800px;
                rotate:45deg;
            }
            50%{
                top: 100px;
                left: 350px;
                rotate:0deg;
            }
            100%{
                top: 0px;
                left: -100px;
                rotate:45deg;
            }
        }
        .abeja2{
            position: absolute;
            width: 100%;
            z-index: 0;
        }


        .pradera{
            position: absolute;
            top:-450px;
            left: 0px;
            width: 100%;
            z-index: -1;
        }
        .cielo{
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            z-index: -2;
        }
    </style>
</head>
<body>
    <div class = "contenedor">
        <div class = "cuadrito">
            <img class="abeja" src="./imgs/Abeja.webp" alt="">
            
        </div>
        <div class = "cuadrito2">
            <img class="abeja2" src="imgs/abeja2.webp" alt="">
            
        </div>

        <img class = "pradera" src="./imgs/pradera.png" alt="">
        <img class = "cielo" src="./imgs/cielo.png" alt="">
    </div>
</body>
</html>
