<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Agua de Coco</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
        }


        
        .ads-container {
            width: 380px;
            height: 600px;
            background-color: #fdd835;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 8px solid white;
        }

        .palm-leaf {
            position: absolute;
            top: -20px;
            right: -30px;
            width: 180px;
            transform: rotate(-15deg);
            z-index: 1;
        }

        .coconut-piece-1 {
            position: absolute;
            width: 100px;
            top: -150px;
            left: 20px;
            z-index: 2;
            animation: caer 1s ease-out forwards;
            animation-delay: 0.2s;
        }

       
        .coconut-piece-2 {
            position: absolute;
            width: 120px;
            bottom: -150px;
            right: 10px;
            z-index: 2;
            animation: subir 1s ease-out forwards;
            animation-delay: 0.4s;
        }

       
        .product-center {
            position: absolute;
            width: 220px;
            top: 50%;
            left: 50%;
            /* Iniciamos invisible y pequeño */
            transform: translate(-50%, -50%) scale(0);
            z-index: 10;
            animation: aparecerCentro 0.8s ease-out forwards;
            animation-delay: 0.8s;
        }

        .vanilla-1 {
            position: absolute;
            width: 80px;
            bottom: 120px;
            left: -100px;
            z-index: 11;
            animation: entrarIzquierda 0.8s ease-out forwards;
            animation-delay: 1.2s;
        }

        .vanilla-2 {
            position: absolute;
            width: 60px;
            top: 150px;
            right: -100px;
            z-index: 11;
            animation: entrarDerecha 0.8s ease-out forwards;
            animation-delay: 1.4s;
        }

        .header-text {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            color: #333;
            z-index: 5;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
            animation-delay: 0.6s;
        }

        .flavor-label {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            z-index: 20;
            opacity: 0;
            animation: fadeIn 1s forwards;
            animation-delay: 1.6s;
        }


        @keyframes caer {
            to { top: 40px; transform: rotate(15deg); }
        }

        @keyframes subir {
            to { bottom: 60px; transform: rotate(-10deg); }
        }

        @keyframes aparecerCentro {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes entrarIzquierda {
            to { left: 40px; }
        }

        @keyframes entrarDerecha {
            to { right: 30px; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

    </style>
</head>
<body>

<div class="ads-container">
    <img src="imgs/coco4.png" class="palm-leaf">

    <div class="header-text">
        <p>¿YA PROBASTE EL</p>
        <h1 style="font-size: 35px;">NUEVO SABOR?</h1>
    </div>

    <img src="imgs/coco1.png" class="coconut-piece-1">
    <img src="imgs/coco2.png" class="coconut-piece-2">
    <img src="imgs/coco5.webp" class="product-center" id="main-product">

    <img src="imgs/coco3.png" class="vanilla-1">
    <img src="imgs/coco6.webp" class="vanilla-2">

    <div class="flavor-label">
        <h2 style="color: white; text-shadow: 1px 1px 5px rgba(0,0,0,0.2);">AGUA DE COCO</h2>
    </div>
</div>

<script>
    
    const product = document.getElementById('main-product');
    
    product.addEventListener('mouseenter', () => {
        product.style.transition = "transform 0.3s ease";
        product.style.transform = "translate(-50%, -50%) scale(1.05)";
    });

    product.addEventListener('mouseleave', () => {
        product.style.transform = "translate(-50%, -50%) scale(1)";
    });
</script>

</body>
</html>
